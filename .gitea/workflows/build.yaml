name: Build and Push Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in and Push Image
        run: |
          REGISTRY_DOMAIN=$(echo "$GITHUB_SERVER_URL" | cut -d'/' -f3)
          echo "Logging in to registry: $REGISTRY_DOMAIN"

          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "$REGISTRY_DOMAIN" -u gitea-admin --password-stdin

          IMAGE_BASE="$REGISTRY_DOMAIN/gitea-admin/actual-sync-minimal"

          # Build with a temp tag
          docker build -t "$IMAGE_BASE:temp" .

          # Always push commit SHA tag
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          docker tag "$IMAGE_BASE:temp" "$IMAGE_BASE:$SHORT_SHA"
          docker push "$IMAGE_BASE:$SHORT_SHA"
          echo "Pushed: $IMAGE_BASE:$SHORT_SHA"

          # Always push latest
          docker tag "$IMAGE_BASE:temp" "$IMAGE_BASE:latest"
          docker push "$IMAGE_BASE:latest"
          echo "Pushed: $IMAGE_BASE:latest"

          # If triggered by a tag push, push that tag
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "Triggered by tag push: $GITHUB_REF_NAME"
            docker tag "$IMAGE_BASE:temp" "$IMAGE_BASE:$GITHUB_REF_NAME"
            docker push "$IMAGE_BASE:$GITHUB_REF_NAME"
            echo "Pushed: $IMAGE_BASE:$GITHUB_REF_NAME"
          fi

          # Also check if there are any Git tags pointing at this commit
          git fetch --tags || true
          for TAG in $(git tag --points-at HEAD 2>/dev/null); do
            if [ "$TAG" != "$GITHUB_REF_NAME" ]; then
              echo "Found Git tag at HEAD: $TAG"
              docker tag "$IMAGE_BASE:temp" "$IMAGE_BASE:$TAG"
              docker push "$IMAGE_BASE:$TAG"
              echo "Pushed: $IMAGE_BASE:$TAG"
            fi
          done

      - name: Link Package to Repository
        run: |
          curl -k -s -X POST \
            -u "gitea-admin:${{ secrets.REGISTRY_PASSWORD }}" \
            "http://gitea-http.gitea.svc.cluster.local:3000/api/v1/packages/gitea-admin/container/actual-sync-minimal/-/link/actual-sync-minimal"
